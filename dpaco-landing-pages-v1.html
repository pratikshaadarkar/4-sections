function Eyebrow({ label, light }) {
  return (
    <div className="flex items-center gap-3 mb-5">
      <div className={`h-px w-10 ${light ? 'bg-earth-400' : 'bg-earth-600'}`} />
      <span className={`text-[10px] font-bold tracking-[.35em] uppercase ${light ? 'text-earth-400' : 'text-earth-600'}`}>{label}</span>
    </div>
  );
}

function StageBar({ stages }) {
  const [active, setActive] = useState(0);
  return (
    <div>
      {/* Tab row */}
      <div className="grid grid-cols-4 gap-2 mb-8">
        {stages.map((s,i) => (
          <button key={i} onClick={() => setActive(i)}
            className={`text-left px-4 py-3 border transition-all duration-150 ${active===i ? 'bg-navy-800 border-navy-800' : 'bg-white border-earth-200 hover:border-navy-700'}`}>
            <span className={`block text-[10px] font-bold tracking-widest mb-1 ${active===i ? 'text-earth-400' : 'text-earth-600'}`}>{s.num}</span>
            <span className={`block text-sm font-bold leading-tight ${active===i ? 'text-white' : 'text-navy-800'}`}>{s.title}</span>
          </button>
        ))}
      </div>
      {/* Detail panel */}
      <div className="bg-navy-800 p-8 fade-in" key={active}>
        <p className={`text-earth-400 text-xs font-semibold tracking-widest uppercase mb-3`}>{stages[active].sub}</p>
        <p className="text-earth-200 text-base leading-relaxed">{stages[active].body}</p>
      </div>
    </div>
  );
}
